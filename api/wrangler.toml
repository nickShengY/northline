name = "northline-api-dev"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
APP_ENV = "development"
NEON_DATABASE_URL = "postgresql://localhost:5432/northline"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts"
preview_bucket_name = "northline-artifacts-preview"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDurableObject"]

[env.staging]
name = "northline-api-staging"
[env.staging.vars]
APP_ENV = "staging"
CORS_ORIGIN = "https://northline-web-rho.vercel.app"
OBSERVABILITY_NATIVE = "true"
AIS_PROXY_URL = "https://northline-ais-proxy-staging.19971117yunshen.workers.dev"
STRIPE_CHECKOUT_MODE = "subscription"
STRIPE_SUCCESS_URL = "https://northline-web-rho.vercel.app/?billing=success"
STRIPE_CANCEL_URL = "https://northline-web-rho.vercel.app/?billing=cancel"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts-staging"

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

[env.production]
name = "northline-api"
[env.production.vars]
APP_ENV = "production"
CORS_ORIGIN = "https://northline-web-rho.vercel.app"
OBSERVABILITY_NATIVE = "true"
AIS_PROXY_URL = "https://northline-ais-proxy.19971117yunshen.workers.dev"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts-prod"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"
