name = "northline-api-dev"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "development"
NEON_DATABASE_URL = "postgresql://localhost:5432/northline"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts"
preview_bucket_name = "northline-artifacts-preview"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDurableObject"]

[env.staging]
name = "northline-api-staging"
[env.staging.vars]
APP_ENV = "staging"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts-staging"

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

[env.production]
name = "northline-api"
[env.production.vars]
APP_ENV = "production"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts-prod"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"
