name = "northline-api-local"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "development"
NEON_DATABASE_URL = "postgresql://postgres:password@127.0.0.1:5432/northline"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts"
preview_bucket_name = "northline-artifacts-preview"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDurableObject"]
