name = "northline-api-local"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "development"
NEON_DATABASE_URL = "postgresql://postgres:password@127.0.0.1:5432/northline"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "northline-artifacts"
preview_bucket_name = "northline-artifacts-preview"

[[d1_databases]]
binding = "DB"
database_name = "northline-db"
database_id = ""
