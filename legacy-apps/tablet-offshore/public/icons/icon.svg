<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#40e0b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#020a14"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad1)" stroke-width="8" filter="url(#glow)"/>

  <!-- Inner compass/navigation icon -->
  <path d="M256 96 L280 220 L400 256 L280 292 L256 416 L232 292 L112 256 L232 220 Z"
        fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="40" fill="#020a14"/>
  <circle cx="256" cy="256" r="20" fill="url(#grad1)"/>
</svg>
